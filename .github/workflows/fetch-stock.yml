name: Fetch Stock Data

on:
  schedule:
    # 매일 KST 07:00 = UTC 22:00 (전날)
    - cron: "0 22 * * *"
  workflow_dispatch:   # 수동 실행 허용

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests FinanceDataReader

      - name: Run ETL
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: python scripts/fetch_stock_daily.py

      - name: Build Race data
        run: python scripts/build_all_race_data.py

      - name: Check Korean Education DB
        run: |
          if [ -f data/education/korean/db/korean_edu.db ]; then
            echo "Korean Education DB: $(du -h data/education/korean/db/korean_edu.db | cut -f1)"
          else
            echo "Korean Education DB: not found (skip)"
          fi

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "변경 없음 — commit 건너뜀"
          else
            TODAY=$(date -u +"%Y-%m-%d")
            git commit -m "data: 주식 시세 갱신 ${TODAY} [skip ci]"
            git push
          fi
